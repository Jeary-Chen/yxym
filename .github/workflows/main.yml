name: Update Cloudflare DNS

on:
  schedule:
    - cron: '*/30 * * * *'  # 每隔三十分钟运行一次
  workflow_dispatch:      # 允许手动触发

jobs:
  update-dns:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: Run update script
      env:
        # 将 Secret 映射为环境变量，增加安全性
        RAW_CF_TOKEN: ${{ secrets.CF_API_TOKEN }}
        TARGET_DOMAINS: ${{ secrets.MY_DOMAINS }}
      run: |
        # 1. 清理 Token 中的换行符或回车符（防止从网页复制时带入不可见字符）
        CLEAN_TOKEN=$(echo "$RAW_CF_TOKEN" | tr -d '\r\n')
        
        # 2. 执行 Python 脚本
        # 使用环境变量中的域名，彻底不在代码硬编码
        CF_API_TOKEN="${CLEAN_TOKEN}" python bestdomain.py --domains "${TARGET_DOMAINS}"
